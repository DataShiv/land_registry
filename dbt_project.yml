name: 'land_registry'
version: "1.0.0"
config-version: 2

profile: land_registry

model-paths:
  - models

analysis-paths:
  - analyses

test-paths:
  - tests

seed-paths:
  - seeds

macro-paths:
  - macros

snapshot-paths:
  - snapshots

target-path: target

clean-targets:
  - target
  - dbt_packages

models:
  land_registry:
    staging:
      +schema: staging
      +materialized: view

    intermediate:
      +schema: intermediate
      +materialized: view

    marts:
      core:
        +schema: marts_core
        +materialized: table

      analytics:
        +schema: marts_analytics
        +materialized: table
